name: Deploy to Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v5

      - name: Setup Node.js 🧰
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies 📦
        working-directory: store-ev
        run: npm ci

      - name: Build website 🔧
        working-directory: store-ev
        run: |
          npm run build -w ./packages/website --if-present
        env:
          SITE_URL: https://store.enchufevirtual.com
          NEXT_PUBLIC_BASE_PATH: ''
          NEXT_PUBLIC_CL_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_CL_CLIENT_ID }}
          NEXT_PUBLIC_JSON_DATA_FOLDER: data/json/
          NEXT_PUBLIC_LOCALES_DATA_FOLDER: data/locales/
          NEXT_PUBLIC_DEFAULT_LANGUAGE: es
          NEXT_PUBLIC_DATA_FETCHING: ssg

      - name: Generate CNAME
        run: echo 'store.enchufevirtual.com' > ./store-ev/packages/website/out/CNAME

      - name: Setup Pages 📄
        uses: actions/configure-pages@v5

      - name: Upload artifact 🚀
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./store-ev/packages/website/out/

  deploy:
    needs: [build]
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to GitHub Pages 🚀
        id: deployment
        uses: actions/deploy-pages@v4
